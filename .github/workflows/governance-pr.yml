name: Governance PR

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      base:
        description: Base commit SHA
        required: true
      head:
        description: Head commit SHA
        required: true
      task_ids:
        description: Comma-separated v6 task identifiers
        required: false
      authority_probe:
        description: Exercise the protected GitHub Sigstore authority path without mutating Task state
        required: false
        type: boolean
        default: false
      authority_task_id:
        description: One v6 Task identifier to bind to an authority probe
        required: false

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MAC_TASK_IDS: ${{ github.event.inputs.task_ids || vars.MAC_TASK_IDS }}
      MAC_GOVERNANCE_LEVEL: ${{ vars.MAC_GOVERNANCE_LEVEL }}
      PR_BASE: ${{ github.event.pull_request.base.sha || github.event.inputs.base }}
      PR_HEAD: ${{ github.event.pull_request.head.sha || github.event.inputs.head }}
    steps:
      - name: Check out PR head with history
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.PR_HEAD }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked environment
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.13"
          enable-cache: true
      - name: Synchronize dependencies
        run: uv sync --locked --extra test
      - name: Verify locked schema bundle
        run: uv run --frozen python scripts/release/check_schema_lock.py
      - name: Validate scope and commit-bound evidence
        run: >-
          uv run --frozen python scripts/ci/governance_pr.py
          --base "$PR_BASE" --head "$PR_HEAD" --json

  authority-probe:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.authority_probe }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: governance-authority
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      MAC_AUTHORITY_PROBE_TASK_ID: ${{ inputs.authority_task_id }}
    steps:
      - name: Check out the trusted workflow revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Set up locked environment
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.13"
          enable-cache: true
      - name: Synchronize dependencies
        run: uv sync --locked
      - name: Prepare the exactly-bound authority probe
        run: >-
          uv run --frozen python scripts/ci/governance_pr.py
          --github-attestation-probe-prepare
          --subject "$RUNNER_TEMP/mac-authority-probe.json"
          --predicate "$RUNNER_TEMP/mac-authority-predicate.json"
      - name: Sign the authority probe with GitHub OIDC and Sigstore
        id: authority-attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ runner.temp }}/mac-authority-probe.json
          predicate-type: https://github.com/IvesChenHX/multi-agent-collab/attestations/authority-probe/v1
          predicate-path: ${{ runner.temp }}/mac-authority-predicate.json
          show-summary: false
      - name: Verify the bundle, signer workflow, source and transparency timestamp
        run: >-
          uv run --frozen python scripts/ci/governance_pr.py
          --github-attestation-probe-verify
          --subject "$RUNNER_TEMP/mac-authority-probe.json"
          --predicate "$RUNNER_TEMP/mac-authority-predicate.json"
          --bundle "${{ steps.authority-attestation.outputs.bundle-path }}"
