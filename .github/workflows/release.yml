name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing SemVer tag to release
        required: true

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}

jobs:
  verify:
    name: Verify ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
      - name: Set up locked Python environment
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Synchronize dependencies
        run: uv sync --locked --extra test
      - name: Verify locked schema bundle
        run: uv run --frozen python scripts/release/check_schema_lock.py
      - name: Check tag and package version
        run: uv run --frozen python scripts/release/check_release_version.py --tag "${{ env.RELEASE_TAG }}"
      - name: Run full tests
        run: uv run --frozen pytest
      - name: Validate repository
        run: uv run --frozen mac validate --json

  build:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
      - name: Set up locked build environment
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.13"
      - name: Verify locked schema bundle
        run: python scripts/release/check_schema_lock.py
      - name: Build wheel and source distribution
        run: uv build
      - name: Generate CycloneDX SBOM
        run: python scripts/release/generate_sbom.py --dist-dir dist --output dist/sbom.cdx.json
      - name: Generate artifact hashes
        run: python scripts/release/generate_hashes.py dist
      - name: Upload immutable build output
        uses: actions/upload-artifact@v7.0.1
        with:
          name: unsigned-release
          path: dist/
          if-no-files-found: error
          retention-days: 30

  attest:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download immutable build output
        uses: actions/download-artifact@v8
        with:
          name: unsigned-release
          path: dist
      - name: Create Sigstore-signed build provenance
        id: provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - name: Attest CycloneDX SBOM with Sigstore
        id: sbom
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          sbom-path: dist/sbom.cdx.json
      - name: Preserve local Sigstore bundles
        run: |
          cp "${{ steps.provenance.outputs.bundle-path }}" dist/provenance.sigstore.json
          cp "${{ steps.sbom.outputs.bundle-path }}" dist/sbom.sigstore.json
      - name: Upload signed release output
        uses: actions/upload-artifact@v7.0.1
        with:
          name: signed-release
          path: dist/
          if-no-files-found: error
          retention-days: 30

  github-release:
    needs: attest
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Download signed release output
        uses: actions/download-artifact@v8
        with:
          name: signed-release
          path: dist
      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ env.RELEASE_TAG }}" dist/* --verify-tag --generate-notes

  pypi-publish:
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/multi-agent-collab/
    permissions:
      id-token: write
    steps:
      - name: Download signed release output
        uses: actions/download-artifact@v8
        with:
          name: signed-release
          path: dist
      - name: Select Python distributions
        run: |
          mkdir publish
          cp dist/*.whl dist/*.tar.gz publish/
      - name: Publish through PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: publish/
