# 多 Agent 协作机器配置。人类可读规则以 AGENTS.md 为准。
# 同一规则只在一个位置维护；本文件不重复角色内部说明和状态转换细节。
schema_version: 6
project: multi-agent-collab
governance_level: advisory

# 关键目录位置。
paths:
  workflows: .agents/workflows
  ownership: .agents/ownership.yaml
  tasks: tasks
  runtime_profiles: .agents/runtime-profiles
  private_artifacts: tasks/private

# 默认工作流。这里使用机器可读的工作流 id。
default_workflow: evidence-driven-development
default_runtime_profile: local-single

# 五种任务模式；ask/quick 旁路持久状态机。
modes:
  ask:
    persistent: false
    allow_write: false
  quick:
    persistent: false
    max_changed_files: 5
    max_changed_lines: 200
    require_single_owner: true
    require_targeted_verification: true
    forbidden_risk_tags:
      - public_contract
      - data_migration
      - auth_security
      - production_deploy
      - cross_service_consistency
      - policy_change
  standard:
    persistent: true
    required_gates:
      - approved_scope
      - targeted_tests
      - evidence_matches_current_commit
    minimum_review_independence: L1
  high_risk:
    persistent: true
    required_gates:
      - approved_scope
      - targeted_tests
      - negative_security_tests
      - secret_scan
      - scope_guard
      - independent_review
      - rollback_plan
      - rollback_verification
      - evidence_matches_current_commit
    minimum_review_independence: L2
  audit:
    persistent: true
    required_gates:
      - approved_scope
      - targeted_tests
      - negative_security_tests
      - secret_scan
      - scope_guard
      - independent_review
      - rollback_plan
      - rollback_verification
      - evidence_matches_current_commit
      - audit_bundle
    minimum_review_independence: L3
    require_export_bundle: true

# Close、返工和治理敏感路径门禁。
close_policy:
  require_commit_bound_evidence: true
  non_waivable_gates:
    - approved_scope
    - evidence_matches_current_commit
    - independent_review
    - data_integrity
  risk_acceptance_default_ttl_days: 30

repair_policy:
  max_automatic_rounds_per_root_cause: 2
  fresh_context_categories:
    - security
    - data
    - compatibility

security:
  governance_sensitive_paths:
    - AGENTS.md
    - .agents/**
    - .github/workflows/*governance*
    - schemas/**
  forbid_shell_by_default: true
  raw_logs_committed: false
