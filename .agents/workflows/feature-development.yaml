# 仅用于识别旧任务；新任务不得使用本工作流。
name: feature-development
version: 1
status: legacy
replacement: evidence-driven-development

legacy_policy:
  start_new_task: forbidden
  historical_records_remain_read_only: true
  do_not_reinterpret_historical_stage_results: true
  historical_mode_names:
    light: historical_only

resume_with_current_work:
  - 使用当前 AGENTS.md 和 .agents/config.yaml 重新执行 Triage。
  - 将仍然有效的范围、决策和证据整合进 tasks/{task_id}/task.md。
  - 保留原阶段文档作为历史证据，不继续生成旧式固定文档链。
  - 使用 evidence-driven-development 状态机继续任务。
