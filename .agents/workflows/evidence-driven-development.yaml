schema_version: 6
name: evidence-driven-development
version: 6
initial_state: triage

states:
  - triage
  - ready
  - executing
  - verifying
  - reviewing
  - repairing
  - waiting_input
  - waiting_external
  - completed
  - completed_with_risk
  - failed
  - cancelled
  - superseded

terminal_states:
  - completed
  - completed_with_risk
  - failed
  - cancelled
  - superseded

guards:
  triage_complete:
    description: mode、验收、owner、runtime 与冻结策略引用完整
    machine_check: triage_complete(task)
  scope_approved:
    description: scope contract 已由满足独立性要求的授权 actor 批准
    machine_check: scope.status == 'approved' and scope_approval_independence_satisfied(task)
  gates_selected:
    description: mode、风险和敏感路径要求的 gates 已写入任务
    machine_check: required_gates_resolved(task, scope)
  runtime_satisfied:
    description: runtime profile 和 fallback 满足 work unit 要求
    machine_check: runtime_supports(work_unit.requirements)
  controller_lease_valid:
    description: active controller lease 和 expected revision 有效
    machine_check: controller_lease_valid(task)
  work_unit_dependencies_complete:
    description: work unit 的前置依赖均已完成
    machine_check: work_unit_dependencies_complete(task)
  baseline_recorded:
    description: run 的 commit、worktree 和 branch 基线已记录
    machine_check: run_baseline_recorded(task)
  result_submitted:
    description: 所有必要 work unit 已提交结构化 Result
    machine_check: required_results_present(task)
  scope_clean:
    description: 当前 diff 不存在未处理的 scope 或 ownership 违规
    machine_check: scope_guard(task).blocking == 0
  current_subject_digest:
    description: 当前 workspace 或 commit digest 已计算
    machine_check: current_subject_digest_present(task)
  evidence_complete:
    description: 必要 gate 和验收标准由当前有效 evidence 覆盖
    machine_check: gate_coverage(task).complete
  review_complete:
    description: 独立审查满足 mode 最低等级且审查后 diff 未漂移
    machine_check: review_coverage(task).complete
  close_findings_clean:
    description: blocker 与 major blocking finding 已清零或获得允许的有效豁免
    machine_check: no_unresolved_blocking_findings(task)
  risk_acceptance_valid:
    description: 所有可豁免项均由授权 actor 接受且未过期
    machine_check: waivers(task).valid
  close_actor_authorized:
    description: Close actor 具有关闭权限且未自批敏感 scope
    machine_check: close_actor_authorized(task)

transitions:
  - id: triage_to_ready
    from: triage
    to: ready
    requires: [triage_complete, scope_approved, gates_selected]
  - id: ready_to_executing
    from: ready
    to: executing
    requires: [runtime_satisfied, controller_lease_valid, work_unit_dependencies_complete, baseline_recorded]
  - id: executing_to_verifying
    from: executing
    to: verifying
    requires: [result_submitted, scope_clean, current_subject_digest]
  - id: verifying_to_reviewing
    from: verifying
    to: reviewing
    when: review_required(task)
    requires: [evidence_complete]
  - id: verifying_to_completed
    from: verifying
    to: completed
    when: not review_required(task)
    requires: [evidence_complete, scope_clean, close_findings_clean, close_actor_authorized]
  - id: reviewing_to_completed
    from: reviewing
    to: completed
    requires: [review_complete, evidence_complete, scope_clean, close_findings_clean, close_actor_authorized]
  - id: active_to_repairing
    from: [verifying, reviewing]
    to: repairing
    when: blocking_findings_exist(task)
  - id: repairing_to_verifying
    from: repairing
    to: verifying
    requires: [result_submitted, scope_clean, current_subject_digest]
  - id: active_to_waiting_input
    from: [triage, ready, executing, verifying, reviewing, repairing]
    to: waiting_input
    when: human_input_required(task)
  - id: active_to_waiting_external
    from: [executing, verifying, reviewing]
    to: waiting_external
    when: external_dependency_pending(task)
  - id: waiting_input_to_executing
    from: waiting_input
    to: executing
    when: input_received(task) and risk_surface_unchanged(task)
  - id: waiting_input_to_triage
    from: waiting_input
    to: triage
    when: input_received(task) and risk_surface_changed(task)
  - id: waiting_external_to_verifying
    from: waiting_external
    to: verifying
    when: external_evidence_received(task)
  - id: waiting_external_to_executing
    from: waiting_external
    to: executing
    when: external_dependency_recovered(task)
    requires: [controller_lease_valid, runtime_satisfied]
  - id: to_completed_with_risk
    from: [verifying, reviewing]
    to: completed_with_risk
    requires: [evidence_complete, risk_acceptance_valid, scope_clean, close_findings_clean, close_actor_authorized]
  - id: active_to_failed
    from: [triage, ready, executing, verifying, reviewing, repairing, waiting_input, waiting_external]
    to: failed
    when: unrecoverable_failure(task)
  - id: active_to_cancelled
    from: [triage, ready, executing, verifying, reviewing, repairing, waiting_input, waiting_external]
    to: cancelled
    when: authorized_cancellation(task)
  - id: active_to_superseded
    from: [triage, ready, executing, verifying, reviewing, repairing, waiting_input, waiting_external]
    to: superseded
    when: successor_task_exists(task)
