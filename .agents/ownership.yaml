# 本文件只提供 owner 候选映射；deny/exclude、specificity 和 priority 由 compiler 求值。
# 已批准的 `tasks/TASK-*/scope-contract.yaml` 是最终授权；命中 owner 不等于获得写权限。
schema_version: 6

matching:
  semantics: gitwildmatch
  ambiguous: require_triage
  unassigned: require_triage
  case_sensitive: auto

owners:
  governance:
    description: 人类策略、机器策略、workflow、ownership、角色契约、Schema 与治理 CI
    priority: 1000
    implementation_role: governance-maintainer
    include:
      - AGENTS.md
      - .agents/**
      - schemas/**
      - .github/workflows/*governance*
    approvers:
      - governance-owner

  platform:
    description: Python 治理内核、CLI、领域服务、文件系统与 Git adapter
    priority: 500
    implementation_role: backend-implementer
    include:
      - src/**
      - pyproject.toml
      - Makefile
    exclude:
      - src/mac/adapters/runtime/**
    approvers:
      - platform-owner

  security:
    description: 安全、独立性、风险接受、审计与威胁测试
    priority: 700
    implementation_role: security-implementer
    include:
      - tests/security/**
      - tests/review/**
      - tests/risk/**
      - tests/fixtures/security/**
    approvers:
      - security-owner
    coowners:
      - platform

  devex:
    description: Runtime adapter、CI、发布工程与运维支持
    priority: 600
    implementation_role: devex-implementer
    include:
      - src/mac/adapters/runtime/**
      - tests/adapters/**
      - tests/operations/**
      - .github/**
      - scripts/ci/**
      - scripts/release/**
      - docs/release/**
      - uv.lock
    exclude:
      - .github/workflows/*governance*
    approvers:
      - devex-owner

  tests:
    description: 非安全专项的自动化测试、fixture 与性能基准
    priority: 300
    implementation_role: qa
    include:
      - tests/**
    exclude:
      - tests/security/**
      - tests/review/**
      - tests/risk/**
      - tests/fixtures/security/**
      - tests/adapters/**
      - tests/operations/**
    coowners:
      - platform

  migration:
    description: v5 扫描、v6 转换、基线与回滚工具
    priority: 550
    implementation_role: backend-implementer
    include:
      - migration/**
      - scripts/capture_v5_baseline.py
    approvers:
      - platform-owner

  docs:
    description: 项目说明、ADR、试点与支持文档
    priority: 200
    implementation_role: main-agent
    include:
      - README.md
      - docs/**
      - tasks/**
    exclude:
      - docs/release/**
    approvers:
      - repo-owner

  examples:
    description: 可执行示例和外部 adapter fixtures
    priority: 250
    implementation_role: backend-implementer
    include:
      - examples/**
    approvers:
      - platform-owner

sensitive_paths:
  - pattern: AGENTS.md
    risk_tags: [policy_change]
    required_gates: [approved_scope, independent_review]
  - pattern: .agents/**
    risk_tags: [policy_change]
    required_gates: [approved_scope, independent_review]
  - pattern: schemas/**
    risk_tags: [public_contract, policy_change]
    required_gates: [approved_scope, compatibility_review, independent_review]
  - pattern: .github/workflows/*governance*
    risk_tags: [policy_change, production_deploy]
    required_gates: [approved_scope, independent_review, rollback_verification]
  - pattern: src/mac/application/close.py
    risk_tags: [auth_security, policy_change]
    required_gates: [negative_security_tests, independent_review]
  - pattern: src/mac/application/governance.py
    risk_tags: [auth_security, policy_change]
    required_gates: [negative_security_tests, independent_review]
  - pattern: src/mac/security.py
    risk_tags: [auth_security, policy_change]
    required_gates: [negative_security_tests, independent_review]
