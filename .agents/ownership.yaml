# 本文件由 Discovery 根据真实项目结构维护，只提供 owner 候选映射。
# `tasks/{task_id}/task.md` 的 scope 是最终授权；命中路径不等于自动获得修改权限。
schema_version: 2

authorization:
  final_scope_record: tasks/{task_id}/task.md#scope
  paths_outside_scope: deny
  unresolved_owner: stop_and_return_to_triage
  standard_or_above_assigned_role_unavailable: require_explicit_user_authorization_for_main_agent

matching:
  path_and_file_type_entries_are_hints: true
  multiple_matches: resolve_one_task_owner_in_triage
  no_match: unassigned
  refresh_when_project_structure_changes: true

owners:
  web:
    description: 前端、桌面端 UI、移动端 UI、设计系统和浏览器侧代码。
    implementation_role: frontend-implementer
    paths:
      - frontend/**
      - web/**
      - app/**
      - apps/web/**
      - packages/ui/**
      - src/**/*.vue
      - src/**/*.tsx
      - src/**/*.jsx
      - src/**/*.css
      - src/**/*.scss
    file_types:
      - "*.vue"
      - "*.tsx"
      - "*.jsx"
      - "*.css"
      - "*.scss"

  backend:
    description: 服务端 API、业务服务、权限、任务调度和服务端数据访问。
    implementation_role: backend-implementer
    paths:
      - backend/**
      - server/**
      - api/**
      - services/**
      - apps/api/**
      - src/main/**
    file_types:
      - "*.java"
      - "*.kt"
      - "*.go"
      - "*.rs"
      - "*.py"
      - "*.cs"

  data:
    description: 数据库迁移、ETL、数据模型、分析脚本和数据质量规则。
    implementation_role: assign_in_triage
    paths:
      - db/**
      - database/**
      - migrations/**
      - sql/**
      - dags/**
      - pipelines/**
      - notebooks/**
    file_types:
      - "*.sql"
      - "*.ipynb"

  infra:
    description: 部署、容器、CI/CD、环境变量模板和运行时配置。
    implementation_role: assign_in_triage
    paths:
      - Dockerfile
      - docker-compose.yml
      - docker/**
      - deploy/**
      - k8s/**
      - helm/**
      - .github/**
      - .gitlab-ci.yml
      - Makefile

  shared:
    description: 跨模块公共代码和共享模型。
    implementation_role: assign_in_triage
    paths:
      - shared/**
      - common/**
      - packages/**
      - libs/**

  docs:
    description: 文档、任务记录、ADR 和协作规范。
    implementation_role: main-agent
    paths:
      - README.md
      - AGENTS.md
      - docs/**
      - tasks/**
      - .agents/**

shared_rules:
  - Triage 必须把命中的 owner 映射到执行者：web 默认交给 Frontend Implementer，backend 默认交给 Backend Implementer。
  - data、infra 或其它 owner 的实现工作必须显式指定角色；协调性 docs 工作可由主 Agent 执行。
  - shared owner 必须先确认调用方影响；触及公共契约时开启 Architect 门禁。
  - 同一文件命中多个 owner 时，Triage 必须指定本任务 owner，并写入 task.md 的 scope。
  - 未命中任何 owner 的文件默认为 unassigned，需要主 Agent 决策后才能修改。
  - 任何执行者不得修改未写入 task.md scope 允许路径的业务文件；发现必须修改时，先停止并返回 Triage 重新授权。
  - 未授权跨 owner 修改业务代码视为 P1；授权缺失但未造成业务代码变更时按影响标记 P2 或 P3。
